<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="head">
            <div class="city-name">
                <h1 id="city-title">الاسكندرية</h1>
            </div>
            <div class="date-details">
                <p id="day">الجمعة</p>
                <p id="date">5:00</p>
                <p id="today-date">18-8-2023</p>
            </div>    
        </div>
        <div class="content">
            <div class="card">
                <h2>الفجر</h2>
                <P id="fagr">05:00</P>
            </div>
            <div class="card">
                <h2>الظهر</h2>
                <P id="duhr">05:00</P>
            </div>
            <div class="card">
                <h2>العصر</h2>
                <P id="asr">05:00</P>
            </div>
            <div class="card">
                <h2>المغرب</h2>
                <P id="maghrib">05:00</P>
            </div>
            <div class="card">
                <h2>العشاء</h2>
                <P id="isha">05:00</P>
            </div>
        </div>
        <div class="card">
            <h2>تبقي</h2>
            <p id="next"></p>
        </div>
        <div class="city-choose">
            <select id="city-select">
                
            </select>
        </div>
    </div>
    
    <script src="code.js"></script>
</body>
</html>
